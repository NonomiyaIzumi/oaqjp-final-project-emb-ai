<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detector</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body>
    <h1>Emotion Detector</h1>
    <p>Enter a statement to analyze its emotional tone:</p>
    <input type="text" id="textToAnalyze" size="60" placeholder="Type a statement here...">
    <button onclick="RunSentimentAnalysis()">Run Sentiment Analysis</button>
    <p id="system_response"></p>

    <script>
        function RunSentimentAnalysis() {
            const textToAnalyze = document.getElementById("textToAnalyze").value;
            $.get("/emotionDetector", { textToAnalyze: textToAnalyze })
                .done(function (data) {
                    document.getElementById("system_response").innerText = data;
                })
                .fail(function (jqXHR) {
                    document.getElementById("system_response").innerText = jqXHR.responseText;
                });
        }
    </script>
</body>
</html>
